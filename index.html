<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Life System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1F2124;font-family:'Inter',system-ui,sans-serif;-webkit-text-size-adjust:100%;overflow-x:hidden;color:#E6E8EA}
button,input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#1F2124}
::-webkit-scrollbar-thumb{background:#2F3338;border-radius:2px}
#app{min-height:100vh}
.gc{cursor:pointer;user-select:none;transition:filter .15s}
.gc:hover{filter:brightness(1.3)}
.btn-g{background:none;border:1px solid #2F3338;color:#9AA1A8;border-radius:4px;cursor:pointer;font-size:10px;padding:5px 9px;transition:background .15s}
.btn-g:hover{background:rgba(255,255,255,0.05)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;justify-content:center;z-index:300}
.sheet{background:#262A2D;border-radius:14px 14px 0 0;width:100%;max-width:540px;border:1px solid #2F3338;max-height:85vh;display:flex;flex-direction:column}
.sheet-handle{width:32px;height:3px;background:#2F3338;border-radius:2px;margin:12px auto 12px}
.sheet-header{padding:0 18px 12px;border-bottom:1px solid #2F3338;flex-shrink:0}
.sheet-body{overflow-y:auto;padding:14px 18px 36px;flex:1}
textarea{width:100%;padding:10px 12px;font-size:14px;color:#E6E8EA;background:#1a1d20;border:1px solid #2F3338;border-radius:6px;resize:none;line-height:1.6;display:block;outline:none}
textarea:focus{border-color:#9AA1A8}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#2a2e32;color:#E6E8EA;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid #2F3338;pointer-events:none;z-index:400;letter-spacing:.03em;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.card{background:#262A2D;border:1px solid #2F3338;border-radius:6px;padding:10px 11px;min-width:0;overflow:hidden}
.card-label{font-size:9px;color:#9AA1A8;letter-spacing:.04em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-value{font-size:17px;font-weight:200;color:#E6E8EA;letter-spacing:-.02em}
.card-sub{font-size:9px;color:#5a6068;margin-top:2px}
.note-row{padding:8px 10px;background:#1a1d20;border-radius:5px;margin-bottom:6px;border-left:2px solid #2F3338}
.note-row-label{font-size:9px;color:#5a6068;letter-spacing:.05em;margin-bottom:3px;text-transform:uppercase}
.note-row-text{font-size:12px;color:#9AA1A8;line-height:1.6}
.tab-bar{display:flex;gap:3px;background:#262A2D;padding:4px;border-radius:7px;border:1px solid #2F3338;margin-bottom:12px}
.tab-btn{flex:1;padding:7px 4px;font-size:11px;border-radius:5px;border:none;background:transparent;color:#9AA1A8;cursor:pointer;transition:all .15s;font-weight:400}
.tab-btn.active{background:#1a1d20;color:#F2C572;font-weight:500}
.future-msg{padding:12px;background:#1a1d20;border-radius:6px;text-align:center}
.highlight-pulse{animation:pulse 1.5s ease-out}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(242,197,114,.6)}70%{box-shadow:0 0 0 6px rgba(242,197,114,0)}100%{box-shadow:none}}
.cmd-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;height:52px;background:#0d0f11;border-top:1px solid #2F3338;display:flex;align-items:center;padding:0 16px 0 16px;padding-bottom:env(safe-area-inset-bottom,0px);gap:10px;font-family:'Inter',monospace;cursor:pointer;user-select:none}
.cmd-bar:hover{background:#111417}
.cmd-text{font-size:12px;color:#9AA1A8;letter-spacing:.02em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-text em{color:#F2C572;font-style:normal}
.cmd-input{background:none;border:none;outline:none;font-size:12px;color:#E6E8EA;flex:1;font-family:inherit;letter-spacing:.02em;caret-color:#F2C572}
.cmd-btn{background:none;border:1px solid #2F3338;color:#9AA1A8;border-radius:3px;cursor:pointer;font-size:10px;padding:3px 7px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.cmd-btn:hover,.cmd-btn.active{background:rgba(242,197,114,.12);color:#F2C572;border-color:#F2C572}
.cmd-btn.opt0{border-color:#4A3A5A;color:#9A8AAA}
.cmd-btn.opt0:hover,.cmd-btn.opt0.sel{background:#4A3A5A;color:#E6E8EA;border-color:#6A5A7A}
.cmd-btn.opt1{border-color:#5A4A6A}
.cmd-btn.opt1:hover,.cmd-btn.opt1.sel{background:#3d3550;color:#E6E8EA;border-color:#7A6A8A}
.cmd-btn.opt2:hover,.cmd-btn.opt2.sel{background:rgba(154,161,168,.15);color:#E6E8EA}
.cmd-btn.opt3:hover,.cmd-btn.opt3.sel{background:rgba(242,197,114,.15);color:#F2C572;border-color:#F2C572}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.scan-wrap{display:flex;gap:1.5px;align-items:center;margin-top:7px;height:8px}
.stk{flex:1;height:100%;background:#2a2f34;border-radius:1px;transition:background .05s,opacity .05s}
.stk-on{background:#E0B46A;opacity:.55}
.cursor{animation:blink 1.2s step-end infinite;color:#F2C572}
@media(max-width:400px){.cmd-bar{padding:0 10px;gap:6px}.cmd-text,.cmd-input{font-size:11px}.cmd-btn{font-size:9px;padding:3px 5px}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const APP_VERSION='2.7';
const BG='#1F2124',CARD='#262A2D',DEEP='#1a1d20',BORDER='#2F3338';
const PAST='#8B949E',FUTURE='#2F3338',CURRENT='#F2C572';
const TPRI='#E6E8EA',TSEC='#9AA1A8';
const NL={week:140,month:280,year:500,decade:1000};
const MS=[{label:'school',year:5},{label:'adulthood',year:18},{label:'career',year:22},{label:'midlife',year:45},{label:'retirement',year:65}];
const MN=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const STORE_KEY='ls_v2',CONFIG_KEY='ls_cfg_v2';

const MOOD_LABELS=['critical','degraded','nominal','optimal'];
// ── Season color system ───────────────────────────────────────────
const SC={winter:0x7FA7C9,spring:0x8FBF9A,summer:0xE3B663,autumn:0xC47A4A};
const SPEAKS=[{d:-50,c:SC.winter},{d:15,c:SC.winter},{d:105,c:SC.spring},{d:196,c:SC.summer},{d:288,c:SC.autumn},{d:380,c:SC.winter},{d:470,c:SC.spring}];
function lerpColor(a,b,t){
  const ar=a>>16,ag=(a>>8)&0xff,ab=a&0xff,br=b>>16,bg=(b>>8)&0xff,bb=b&0xff;
  const rr=ar+t*(br-ar),rg=ag+t*(bg-ag),rb2=ab+t*(bb-ab);
  return'#'+(((1<<24)+(rr<<16)+(rg<<8)+rb2)|0).toString(16).slice(1);
}
function _ss(t){return t*t*(3-2*t);}
function seasonColor(birthDoy,weekIdx){
  const d=((birthDoy+weekIdx*7)%365+365)%365;
  let p0=SPEAKS[1],p1=SPEAKS[2];
  for(let i=1;i<SPEAKS.length-1;i++){
    if(d<SPEAKS[1].d){p0=SPEAKS[0];p1=SPEAKS[1];break;}
    if(d>=SPEAKS[i].d&&d<SPEAKS[i+1].d){p0=SPEAKS[i];p1=SPEAKS[i+1];break;}
  }
  const span=p1.d-p0.d;if(span<=0)return lerpColor(p0.c,p1.c,0);
  return lerpColor(p0.c,p1.c,_ss(Math.max(0,Math.min(1,(d-p0.d)/span))));
}
function getBirthDoy(){
  if(!A.birthDate)return 0;
  const b=new Date(A.birthDate),s=new Date(b.getFullYear(),0,1);
  return Math.floor((b-s)/86400000);
}
function getWeekColor(weekIdx){return seasonColor(getBirthDoy(),weekIdx);}

// Decade palette — muted earthy tones, machine-instrument feel
const DECADE_COLS=[
  0x6A8FA8, // 0-9:  slate blue
  0xA89068, // 10-19: warm sand
  0x6A9478, // 20-29: muted sage
  0xA0704A, // 30-39: terracotta
  0x7A8A7A, // 40-49: cool grey-green
  0x8A7A9A, // 50-59: dusty mauve
  0x6A8878, // 60-69: teal grey
  0x9A8860, // 70-79: aged brass
  0x7A6A8A, // 80-89: twilight
];
function getDecadeColor(year){
  const dec=Math.floor(year/10);
  const c=DECADE_COLS[dec%DECADE_COLS.length];
  const r=(c>>16)&0xff,g=(c>>8)&0xff,b=c&0xff;
  return `rgb(${r},${g},${b})`;
}
function getDecadeColorDim(year){
  const dec=Math.floor(year/10);
  const c=DECADE_COLS[dec%DECADE_COLS.length];
  const r=(c>>16)&0xff,g=(c>>8)&0xff,b=c&0xff;
  // dim for future cells
  return `rgb(${Math.round(r*.22)},${Math.round(g*.22)},${Math.round(b*.22)})`;
}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}



let A={
  step:'input',birthDate:'',lifespan:90,mission:'',
  tab:'weeks',notes:{},moods:{},sheet:null,sheetText:'',stats:null,
  highlightWeek:null,gotoOpen:false,aiOpen:false,timeItems:null,timeSheet:false,
  missionStartWeek:null,missionLog:[],legendOpen:false,
  logSheet:false,logStep:'rate',logMood:null,logNote:'',logMissionDone:null,menuSheet:false
};

function save(){localStorage.setItem(STORE_KEY,JSON.stringify({notes:A.notes,moods:A.moods}));}
function saveConfig(){localStorage.setItem(CONFIG_KEY,JSON.stringify({birthDate:A.birthDate,lifespan:A.lifespan,mission:A.mission,timeItems:A.timeItems,missionStartWeek:A.missionStartWeek,missionLog:A.missionLog}));}
const DEFAULT_TIME_ITEMS=[
  {l:'weeks until retirement',type:'age',target:65,unit:'weeks'},
  {l:'weeks until 2040',type:'date',target:'2040-01-01',unit:'weeks'},
];
function getTimeItems(){return A.timeItems&&A.timeItems.length?A.timeItems:DEFAULT_TIME_ITEMS;}
function load(){
  try{const n=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');A.notes=n.notes||{};A.moods=n.moods||{};}catch{}
  try{const cfg=JSON.parse(localStorage.getItem(CONFIG_KEY)||'null');
    if(cfg&&cfg.birthDate){A.birthDate=cfg.birthDate;A.lifespan=cfg.lifespan||90;A.mission=cfg.mission||'';A.timeItems=cfg.timeItems||null;A.missionStartWeek=cfg.missionStartWeek||null;A.missionLog=cfg.missionLog||[];A.stats=calcStats(A.birthDate,A.lifespan);A.step='dashboard';}
  }catch{}
}

function calcStats(bd,ls){
  const now=new Date(),birth=new Date(bd),ms=now-birth;
  const weeksLived=Math.max(0,Math.floor(ms/604800000));
  const totalWeeks=Math.round(ls*52.18);
  const weeksRemaining=Math.max(0,totalWeeks-weeksLived);
  const daysLived=Math.max(0,Math.floor(ms/86400000));
  const pct=Math.min(100,(weeksLived/totalWeeks)*100);
  const yearsLived=daysLived/365.25;
  const heartbeats=daysLived*100800;
  const memoryWrites=Math.round(daysLived*1.5);
  const networkConns=Math.round(Math.min(yearsLived/ls*80000,80000));
  const storageUsed=(daysLived*150*1000/(2.5e15)*100).toFixed(8);
  const errorRate=Math.round(daysLived*0.5);
  const clockMin=(pct/100)*1440;
  const ch=Math.floor(clockMin/60)%24,cm=Math.floor(clockMin%60);
  const clockStr=String(ch).padStart(2,'0')+':'+String(cm).padStart(2,'0');
  return{weeksLived,totalWeeks,weeksRemaining,daysLived,pct,heartbeats,memoryWrites,networkConns,storageUsed,errorRate,clockStr,yearsLived,ls,orbits:yearsLived.toFixed(1)};
}

function weekRange(bd,idx){
  const s=new Date(bd);s.setDate(s.getDate()+idx*7);
  const ev=new Date(s);ev.setDate(ev.getDate()+6);
  const o={month:'short',day:'numeric',year:'numeric'};
  return s.toLocaleDateString('en-US',o)+' – '+ev.toLocaleDateString('en-US',o);
}

function dateToWeekIdx(bd,dateStr){
  const birth=new Date(bd),target=new Date(dateStr);
  return Math.max(0,Math.floor((target-birth)/604800000));
}

function fmt(n){return new Intl.NumberFormat().format(Math.round(n));}
const wk=i=>`w${i}`;
const mk=(y,m)=>`m${y}_${m}`;
const yk=y=>`y${y}`;
const dk=d=>`d${d}`;

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

function render(){document.getElementById('app').innerHTML=buildAll();}
function buildAll(){
  if(A.step==='input')return buildInput();
  return buildDashboard();
}

// ── Input ─────────────────────────────────────────────────────────
function buildInput(){
  return `<div style="min-height:100vh;background:${BG};display:flex;align-items:center;justify-content:center;padding:24px 20px">
  <div style="width:100%;max-width:400px">
    <h1 style="font-size:22px;font-weight:300;color:${TPRI};letter-spacing:-.01em;margin-bottom:6px">life system</h1>
    <p style="font-size:13px;color:${TSEC};margin-bottom:32px;line-height:1.7">a visualization of your time as a running system.</p>
    <div style="display:flex;flex-direction:column;gap:18px">
      <div>
        <label style="display:block;font-size:11px;color:${TSEC};margin-bottom:6px;letter-spacing:.06em">birth date</label>
        <input id="inp-bd" type="date" value="${e(A.birthDate)}" style="width:100%;padding:12px 14px;font-size:16px;color:${TPRI};background:#262A2D;border:1px solid ${BORDER};border-radius:6px;outline:none;color-scheme:dark"/>
      </div>
      <div>
        <label style="display:block;font-size:11px;color:${TSEC};margin-bottom:6px;letter-spacing:.06em">expected lifespan</label>
        <select id="inp-ls" style="width:100%;padding:12px 14px;font-size:16px;color:${TPRI};background:#262A2D;border:1px solid ${BORDER};border-radius:6px;outline:none">
          ${[80,90,100,120].map(v=>`<option value="${v}"${A.lifespan==v?' selected':''}>${v} years${v===90?' (default)':v===120?' (optimistic)':''}</option>`).join('')}
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;color:${TSEC};margin-bottom:6px;letter-spacing:.06em">current mission <span style="color:#5a6068">(optional)</span></label>
        <input id="inp-ms" type="text" value="${e(A.mission)}" placeholder="what are you building?" style="width:100%;padding:12px 14px;font-size:16px;color:${TPRI};background:#262A2D;border:1px solid ${BORDER};border-radius:6px;outline:none"/>
      </div>
      <button onclick="handleStart()" style="margin-top:4px;padding:14px;background:${CURRENT};color:#1F2124;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:500">initialize system</button>
    </div>
    <p style="margin-top:48px;font-size:11px;color:#3d4348;letter-spacing:.05em">systems run one cycle at a time. <span style="font-size:9px">v${APP_VERSION}</span></p>
  </div>
</div>`;
}

// ── Dashboard ─────────────────────────────────────────────────────
function buildDashboard(){
  const s=A.stats;
  return `<div style="min-height:100vh;background:${BG};padding-top:0">
  ${buildCommandBar(s)}
  ${buildSun(s.clockStr)}
  <div style="padding:0 14px 90px;max-width:600px;margin:0 auto">
    ${buildHeader(s)}
    ${A.mission?`<div style="margin-bottom:14px;padding:10px 13px;background:${CARD};border-radius:6px;border-left:2px solid ${CURRENT}"><div style="font-size:9px;color:${TSEC};letter-spacing:.08em;text-transform:uppercase">current mission</div><div style="margin-top:4px;font-size:13px;color:${TPRI};font-style:italic;line-height:1.6">${e(A.mission)}${A.missionStartWeek!==null?`<span style="font-size:10px;color:#5a6068;font-style:normal;margin-left:8px">${s.weeksLived-A.missionStartWeek} wk</span>`:''}​</div></div>`:''}
    ${buildSystemStatus(s)}
    ${buildMetrics(s)}
    ${buildObservations(s)}
    ${buildTimeRemaining(s)}
    ${buildTabs()}
    ${buildGridPanel()}
    ${buildImportExport()}
    <p style="font-size:10px;color:#3d4348;letter-spacing:.05em;text-align:center;margin-top:8px">systems run one cycle at a time. <span style="opacity:.5">v${APP_VERSION}</span></p>
  </div>
  ${A.sheet?buildSheet():''}
  ${A.timeSheet?buildTimeSheetHTML():''}
  ${A.menuSheet?buildMenuSheet():''}
  ${A.logSheet?buildLogSheet():''}
</div>`;
}

// ── Command Bar (display only) ──────────────────────────────────
function buildCommandBar(s){
  const wIdx=s.weeksLived;
  const mood=A.moods[wk(wIdx)];
  const hasLog=mood!==undefined||!!A.notes[wk(wIdx)];
  const ml=hasLog?MOOD_LABELS[mood??2]:null;
  const preview=A.notes[wk(wIdx)];
  const mwk=A.missionStartWeek!==null?s.weeksLived-A.missionStartWeek:0;
  let txt='';
  if(hasLog){
    txt=`<em>></em> cycle ${wIdx} · <em>${ml}</em>${preview?` · "${e(preview.slice(0,38))}${preview.length>38?'…':''}"`:''}`;
  } else {
    txt=`<em>></em> cycle ${wIdx} · <em style="color:#5a6068">no entry</em>`;
  }
  if(A.mission){
    txt+=` <span style="color:#3d4348;font-size:10px">· ${e(A.mission.slice(0,22))}${A.mission.length>22?'…':''} ${mwk}wk</span>`;
  }
  return `<div class="cmd-bar" onclick="openLogSheet()"><span class="cmd-text">${txt}<span class="cursor">_</span></span></div>`;
}

function openLogSheet(){
  const wIdx=A.stats.weeksLived;
  const alreadyLogged=A.moods[wk(wIdx)]!==undefined||!!A.notes[wk(wIdx)];
  if(alreadyLogged){
    A.menuSheet=true;render();
    return;
  }
  A.logSheet=true;
  A.logStep='rate';
  A.logMood=null;
  A.logNote='';
  A.logMissionDone=null;
  render();
}

function buildMenuSheet(){
  if(!A.menuSheet)return'';
  const wIdx=A.stats.weeksLived;
  const mood=A.moods[wk(wIdx)];
  const ml=mood!==undefined?MOOD_LABELS[mood]:null;
  return `<div class="overlay" onclick="if(event.target.classList.contains('overlay')){A.menuSheet=false;render()}">
  <div class="sheet" onclick="event.stopPropagation()" style="max-height:50vh">
    <div class="sheet-handle"></div>
    <div style="padding:0 18px 8px;border-bottom:1px solid ${BORDER};flex-shrink:0">
      <div style="font-size:13px;font-weight:300;color:${TPRI}">cycle ${wIdx}</div>
      <div style="font-size:10px;color:#5a6068;margin-top:2px">${ml?`logged · ${ml}`:'logged'}</div>
    </div>
    <div style="padding:12px 18px 36px">
      <button onclick="A.menuSheet=false;A.logSheet=true;A.logStep='rate';A.logMood=A.moods[wk(A.stats.weeksLived)]??null;A.logNote=A.notes[wk(A.stats.weeksLived)]||'';render()"
        style="width:100%;padding:14px 16px;background:#0d0f11;border:1px solid #2a2e32;border-radius:8px;color:${TPRI};font-size:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;font-family:inherit">
        <span style="color:${CURRENT};font-size:12px;font-family:monospace">↺</span>
        <span>relog cycle</span>
      </button>
    </div>
  </div>
</div>`;
}

function closeLogSheet(){A.logSheet=false;render();}

function logSetMood(m){
  A.logMood=m;
  A.moods[wk(A.stats.weeksLived)]=m;
  save();
  // advance to mission step if mission active, else note
  A.logStep='mission'; // always show — handles both active and no mission
  render();
  setTimeout(()=>{if(A.logStep==='note'){document.getElementById('log-note-ta')?.focus();}},80);
}

function logMissionAnswer(done){
  const wIdx=A.stats.weeksLived;
  if(done){
    // Y = accomplished, prompt new mission
    const wks=A.missionStartWeek!==null?wIdx-A.missionStartWeek:0;
    A.missionLog.push({week:wIdx,mission:A.mission,status:'complete',weeks:wks});
    A.mission='';A.missionStartWeek=null;
    saveConfig();
    A.logStep='newmission';
  } else {
    // N = still working
    A.logStep='note';
  }
  render();
  setTimeout(()=>{
    if(A.logStep==='note')document.getElementById('log-note-ta')?.focus();
    if(A.logStep==='newmission')document.getElementById('log-mission-inp')?.focus();
  },80);
}

function logSaveNewMission(){
  const inp=document.getElementById('log-mission-inp');
  const ms=(inp?.value||'').trim();
  if(ms){A.mission=ms;A.missionStartWeek=A.stats.weeksLived;saveConfig();}
  A.logStep='note';
  render();
  setTimeout(()=>document.getElementById('log-note-ta')?.focus(),80);
}

function logSkipMission(){A.logStep='note';render();setTimeout(()=>document.getElementById('log-note-ta')?.focus(),80);}
function logSkipToNewMission(){A.logStep='newmission';render();setTimeout(()=>document.getElementById('log-mission-inp')?.focus(),80);}

function logSave(){
  const wIdx=A.stats.weeksLived;
  const note=A.logNote.trim();
  if(note)A.notes[wk(wIdx)]=note;
  else delete A.notes[wk(wIdx)];
  save();
  closeLogSheet();
  showToast('cycle logged');
}

function buildLogSheet(){
  if(!A.logSheet)return'';
  const wIdx=A.stats.weeksLived;
  const step=A.logStep;
  const mwk=A.missionStartWeek!==null?wIdx-A.missionStartWeek:0;

  // ── mini keyboard keys helper
  function miniKeys(keys){
    // keys: [{k:'0',label:'critical',action:'logSetMood(0)',sel:false}, ...]
    const rows=[];
    for(let i=0;i<keys.length;i+=2){
      const pair=keys.slice(i,i+2);
      rows.push(`<div style="display:flex;gap:8px">${pair.map(k=>`
        <button onclick="${k.action}" style="flex:1;padding:14px 8px;border-radius:8px;border:1px solid ${k.sel?CURRENT:'#2F3338'};background:${k.sel?'rgba(242,197,114,.1)':'#0d0f11'};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s">
          <span style="font-size:18px;font-weight:300;color:${CURRENT};font-family:monospace">${k.k}</span>
          <span style="font-size:10px;color:#9AA1A8;letter-spacing:.04em">${k.label}</span>
        </button>`).join('')}</div>`);
    }
    return rows.join('<div style="height:8px"></div>');
  }

  let body='';

  if(step==='rate'){
    const keys=[
      {k:'0',label:'critical',action:'logSetMood(0)',sel:A.logMood===0},
      {k:'1',label:'degraded',action:'logSetMood(1)',sel:A.logMood===1},
      {k:'2',label:'nominal', action:'logSetMood(2)',sel:A.logMood===2},
      {k:'3',label:'optimal', action:'logSetMood(3)',sel:A.logMood===3},
    ];
    body=`<div style="font-size:10px;color:#5a6068;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px">> rate cycle ${wIdx}</div>
    ${miniKeys(keys)}`;
  }

  if(step==='mission'){
    if(A.mission){
      // active mission — accomplished or still working?
      const keys=[
        {k:'Y',label:'accomplished',action:'logMissionAnswer(true)',sel:false},
        {k:'N',label:'still working',action:'logMissionAnswer(false)',sel:false},
      ];
      body=`<div style="font-size:10px;color:#5a6068;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">> mission accomplished?</div>
      <div style="font-size:12px;color:${CURRENT};font-style:italic;margin-bottom:16px">"${e(A.mission.slice(0,40))}" · ${mwk}wk</div>
      ${miniKeys(keys)}`;
    } else {
      // no mission — set one?
      const keys=[
        {k:'Y',label:'set one',action:'logSkipToNewMission()',sel:false},
        {k:'N',label:'skip',action:'logSkipMission()',sel:false},
      ];
      body=`<div style="font-size:10px;color:#5a6068;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">> no active mission</div>
      ${miniKeys(keys)}`;
    }
  }

  if(step==='newmission'){
    body=`<div style="font-size:10px;color:#5a6068;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">> set new mission</div>
    <input id="log-mission-inp" type="text" maxlength="80" placeholder="what are you building?_"
      style="width:100%;padding:12px 14px;font-size:15px;color:${TPRI};background:#0d0f11;border:1px solid ${BORDER};border-radius:8px;outline:none;caret-color:${CURRENT};font-family:inherit;letter-spacing:.02em"
      oninput="" onkeydown="if(event.key==='Enter')logSaveNewMission()"/>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="logSaveNewMission()" style="flex:1;padding:12px;background:rgba(242,197,114,.1);border:1px solid ${CURRENT};border-radius:8px;color:${CURRENT};font-size:13px;cursor:pointer">set mission</button>
      <button onclick="logSkipMission()" style="padding:12px 16px;background:none;border:1px solid ${BORDER};border-radius:8px;color:#5a6068;font-size:13px;cursor:pointer">skip</button>
    </div>`;
  }

  if(step==='note'){
    const rem=500-A.logNote.length;
    body=`<div style="font-size:10px;color:#5a6068;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">> log entry <span style="opacity:.5">optional</span></div>
    <textarea id="log-note-ta" rows="6" maxlength="500" placeholder="what happened this cycle…&#10;&#10;write freely, paragraphs welcome."
      style="width:100%;padding:12px 14px;font-size:14px;color:${TPRI};background:#0d0f11;border:1px solid ${BORDER};border-radius:8px;resize:none;line-height:1.7;outline:none;caret-color:${CURRENT};font-family:inherit"
      oninput="A.logNote=this.value;document.getElementById('log-rem').textContent=500-this.value.length+' left'"
    >${e(A.logNote)}</textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <span id="log-rem" style="font-size:10px;color:#3d4348">${rem} left</span>
      <div style="display:flex;gap:8px">
        <button onclick="closeLogSheet()" style="padding:10px 16px;background:none;border:1px solid ${BORDER};border-radius:7px;color:#5a6068;font-size:13px;cursor:pointer">cancel</button>
        <button onclick="logSave()" style="padding:10px 22px;background:${CURRENT};border:none;border-radius:7px;color:#1F2124;font-size:13px;cursor:pointer;font-weight:500">save</button>
      </div>
    </div>`;
  }

  return `<div class="overlay" onclick="if(event.target.classList.contains('overlay'))closeLogSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div style="padding:0 18px 4px;border-bottom:1px solid ${BORDER};display:flex;justify-content:space-between;align-items:center;flex-shrink:0">

      <button onclick="closeLogSheet()" style="font-size:22px;color:#5a6068;background:none;border:none;cursor:pointer;padding:0 4px;line-height:1">×</button>
    </div>
    <div style="padding:20px 18px 36px;overflow-y:auto;flex:1">
      ${body}
    </div>
  </div>
</div>`;
}

function buildSystemStatus(s){
  // derive status from pct + recent logging activity
  const recentLogged=Object.keys(A.moods).filter(k=>+k.slice(1)>=s.weeksLived-4).length;
  const mood=A.moods[wk(s.weeksLived)]??A.moods[wk(s.weeksLived-1)]??2;
  let status,color;
  if(mood===0){status='CRITICAL';color='#c47a7a';}
  else if(mood===1||recentLogged<1){status='DEGRADED';color='#b8956a';}
  else if(mood===3&&recentLogged>=3){status='OPTIMAL';color='#8FBF9A';}
  else{status='NOMINAL';color='#8fa8b8';}
  const dot=`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};margin-right:7px;opacity:.9;flex-shrink:0;animation:${status==='CRITICAL'?'blink 1.2s step-end infinite':'none'}"></span>`;
  return `<div style="display:flex;align-items:center;padding:7px 11px;background:#0d0f11;border:1px solid #2a2e32;border-radius:4px;margin-bottom:12px;letter-spacing:.08em">

    <span style="font-size:9px;color:#5a6068;margin-right:6px">SYSTEM STATUS</span>
    <span style="font-size:9px;color:${color};font-weight:500">${status}</span>
    <span style="margin-left:auto;font-size:8px;color:#3d4348;letter-spacing:.04em">${new Date().toISOString().slice(0,16).replace('T',' ')} UTC</span>
  </div>`;
}

// ── Scanline meter widget ─────────────────────────────────────────
function scanBar(pct,uid){
  // 20 tick segments, fills left to right
  const segs=20;
  const filled=Math.round(Math.min(1,Math.max(0,pct))*segs);
  let ticks='';
  for(let i=0;i<segs;i++){
    const active=i<filled;
    ticks+=`<span class="stk${active?' stk-on':''}" id="${uid}_${i}"></span>`;
  }
  return `<div class="scan-wrap" data-pct="${pct}" data-uid="${uid}" data-segs="${segs}">${ticks}</div>`;
}

let _scanAnimated=false;
function animateScans(){
  if(_scanAnimated)return; _scanAnimated=true;
  document.querySelectorAll('.scan-wrap').forEach(wrap=>{
    const pct=parseFloat(wrap.dataset.pct);
    const segs=parseInt(wrap.dataset.segs);
    const uid=wrap.dataset.uid;
    const filled=Math.round(Math.min(1,Math.max(0,pct))*segs);
    for(let i=0;i<filled;i++){
      const el=document.getElementById(uid+'_'+i);
      if(el) setTimeout(()=>el.classList.add('stk-on'), 40 + i*(1100/segs));
    }
  });
}

function buildMetrics(s){
  _scanAnimated=false;
  const totalWeeks=s.totalWeeks;
  const lifeHeartbeats=s.ls*365.25*100800;
  const sleepCycles=Math.round(s.daysLived*0.94);
  const lifeSleepCycles=Math.round(s.ls*365.25*0.94);
  const cards=[
    {l:'weeks lived',    v:fmt(s.weeksLived),    pct:s.weeksLived/totalWeeks,           uid:'m0'},
    {l:'weeks remaining',v:fmt(s.weeksRemaining), pct:s.weeksRemaining/totalWeeks,       uid:'m1'},
    {l:'life elapsed',   v:s.pct.toFixed(1)+'%', pct:s.pct/100,                         uid:'m2'},
    {l:'uptime',         v:'66.7%',              pct:0.667, sub:'awake vs total',         uid:'m3'},
    {l:'heartbeats',     v:`<span id='live-hb'>${fmt(s.heartbeats)}</span>`, raw:true, pct:s.heartbeats/lifeHeartbeats, uid:'m4'},
    {l:'memory writes',  v:`<span id='live-mw'>${fmt(s.memoryWrites)}</span>`, raw:true, pct:s.memoryWrites/(s.ls*365.25*1.5), uid:'m5', sub:'est. memories'},
    {l:'network conns',  v:fmt(s.networkConns),  pct:s.networkConns/80000,              uid:'m6', sub:'of ~80k lifetime'},
    {l:'sleep cycles',   v:fmt(sleepCycles),     pct:sleepCycles/lifeSleepCycles,       uid:'m7', sub:'est. since birth'},
    {l:'error log',      v:fmt(s.errorRate),     pct:Math.min(1,s.errorRate/100000),    uid:'m8', sub:'est. decisions'},
    {l:'earth orbits',   v:`<span id='live-orb'>${s.yearsLived.toFixed(5)}</span>`, raw:true, pct:(s.yearsLived%1), uid:'m9'},
  ];
  const html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px">
    ${cards.map(c=>`<div class="card">
      <div class="card-label">${e(c.l)}</div>
      <div class="card-value">${c.raw?c.v:e(c.v)}</div>
      ${c.sub?`<div class="card-sub">${e(c.sub)}</div>`:''}
      ${scanBar(c.pct,c.uid)}
    </div>`).join('')}
  </div>`;
  setTimeout(animateScans,80);
  return html;
}

// ── Time Remaining ────────────────────────────────────────────────
function calcTimeValue(item,s){
  const age=s.yearsLived;
  let ms=0;
  if(item.type==='age'){ms=Math.max(0,(item.target-age)*365.25*86400000);}
  else{ms=Math.max(0,new Date(item.target)-new Date());}
  const weeks=Math.round(ms/604800000);
  if(item.unit==='days')return{v:Math.round(ms/86400000),sub:item.unit};
  if(item.unit==='years')return{v:(ms/(365.25*86400000)).toFixed(1),sub:item.unit};
  return{v:weeks,sub:'weeks'};
}

      <span style="font-size:9px;color:#5a6068;letter-spacing:.04em">active cycle</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:10px;height:10px;border-radius:1px;background:#2A2E32;border:1px solid #3a3f44;flex-shrink:0"></div>
      <span style="font-size:9px;color:${TSEC};letter-spacing:.06em;width:52px">FUTURE</span>
      <span style="font-size:9px;color:#3d4348">·</span>
      <span style="font-size:9px;color:#5a6068;letter-spacing:.04em">unallocated</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:9px;color:#3d4348;width:10px;text-align:center">●</span>
      <span style="font-size:9px;color:#3d4348;letter-spacing:.06em;width:52px">NOTE</span>
      <span style="font-size:9px;color:#3d4348">·</span>
      <span style="font-size:9px;color:#3d4348;letter-spacing:.04em">entry written</span>
    </div>
  </div>`:''}
  ${gotoOpen?`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
    <input id="goto-date" type="date" style="flex:1;padding:7px 10px;font-size:13px;color:${TPRI};background:${DEEP};border:1px solid ${BORDER};border-radius:5px;outline:none;color-scheme:dark"/>
    <button onclick="gotoDate()" style="padding:7px 14px;background:${CURRENT};color:#1F2124;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap">go →</button>
  </div>`:''}
  <p style="font-size:10px;color:#5a6068;margin-bottom:10px">tap any cell to add a note to that moment in your life.</p>
  ${A.tab==='weeks'?buildWeekGrid():A.tab==='months'?buildMonthGrid():A.tab==='years'?buildYearGrid():buildDecadeGrid()}
</div>`;
}

// ── Week Grid (52-col, 1 row = 1 year) ───────────────────────────
function buildWeekGrid(){
  const s=A.stats,cols=52;
  const totalYears=Math.ceil(s.totalWeeks/cols);
  let html='<div style="display:flex;flex-direction:column;gap:1px">';
  for(let year=0;year<totalYears;year++){
    const isMilestone=year>0?MS.find(m=>m.year===year):null;
    const isCurrYear=Math.floor(s.yearsLived)===year;
    if(isMilestone){
      html+=`<div style="height:1px;background:rgba(154,161,168,.12);margin:5px 0 4px;position:relative"><span style="position:absolute;left:0;top:-8px;font-size:7px;color:${TSEC};opacity:.45;letter-spacing:.06em">${isMilestone.label}</span></div>`;
    }
    html+=`<div style="display:flex;gap:0.5px;align-items:center">`;
    html+=`<span style="font-size:7px;color:${isCurrYear?CURRENT:'#3d4348'};width:18px;flex-shrink:0;text-align:right;margin-right:2px;font-weight:${isCurrYear?500:400}">${year===0?'b':year}</span>`;
    for(let col=0;col<cols;col++){
      const i=year*cols+col;if(i>=s.totalWeeks)break;
      const past=i<s.weeksLived,current=i===s.weeksLived;
      const hasNote=!!A.notes[wk(i)];
      const isHL=A.highlightWeek===i;
      const bg=current?CURRENT:past?getWeekColor(i):FUTURE;
      const brd=`1px solid ${current?CURRENT:past?'transparent':'#2d3238'}`;
      const shadow=current?`0 0 5px ${CURRENT}66`:'none';
      const id=isHL?`id="hl-cell"`:'';
      const cls=`gc${isHL?' highlight-pulse':''}`;
      const dot=hasNote&&(past||current)?`<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3px;color:rgba(255,255,255,.75);line-height:1;pointer-events:none">●</span>`:'';
      html+=`<div ${id} class="${cls}" style="flex:1;aspect-ratio:1;border-radius:1px;background:${bg};border:${brd};box-shadow:${shadow};position:relative;min-width:0" onclick="openSheet('week','${wk(i)}','week ${i+1}','${e(weekRange(A.birthDate,i))}',${NL.week},${(past||current)?1:0})" title="week ${i+1}${current?' · current':''}">${dot}</div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  html+=`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px 12px">${MS.map(m=>`<span style="font-size:8px;color:${TSEC};opacity:.3">— ${m.label} yr ${m.year}</span>`).join('')}</div>`;
  return html;
}

// ── Month Grid ────────────────────────────────────────────────────
function buildMonthGrid(){
  const s=A.stats,cols=12;
  const totalMonths=Math.round(s.ls*12),monthsLived=Math.floor(s.yearsLived*12);
  let html='<div style="display:flex;flex-direction:column;gap:2px">';
  for(let row=0;row<Math.ceil(totalMonths/cols);row++){
    const year=row,isMilestone=MS.find(m=>m.year===year),isCurrYear=Math.floor(s.yearsLived)===year;
    if(isMilestone)html+=`<div style="height:1px;background:rgba(154,161,168,.12);margin:2px 0;position:relative"><span style="position:absolute;right:0;top:-7px;font-size:8px;color:${TSEC};opacity:.4">${isMilestone.label}</span></div>`;
    html+=`<div style="display:flex;gap:2px;align-items:center"><span style="font-size:8px;color:${isCurrYear?CURRENT:'#3d4348'};width:22px;flex-shrink:0;text-align:right;margin-right:2px;font-weight:${isCurrYear?500:400}">${year===0?'b':year}</span>`;
    for(let col=0;col<cols;col++){
      const i=row*cols+col;if(i>=totalMonths)break;
      const past=i<=monthsLived,current=i===monthsLived;
      const mKey=mk(year,col);
      const wStart=Math.round(i*(52.18/12)),wEnd=Math.round((i+1)*(52.18/12));
      let hasNote=!!A.notes[mKey];
      if(!hasNote)for(let wi=0;wi<wEnd-wStart;wi++){const idx=wStart+wi;if(idx<=s.weeksLived&&A.notes[wk(idx)]){hasNote=true;break;}}
      // season color: use middle week of this month
      const midWeek=Math.round(i*(52.18/12)+(52.18/24));
      const sc=getWeekColor(midWeek);
      const bg=current?CURRENT:past?sc:getDecadeColorDim(year);
      const brd=`1px solid ${current?CURRENT:past?'transparent':'#2a2e32'}`;
      const shadow=current?`0 0 6px ${CURRENT}44`:'none';
      const dot=hasNote&&past?`<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3px;color:rgba(255,255,255,.75);line-height:1;pointer-events:none">●</span>`:'';
      html+=`<div class="gc" style="flex:1;aspect-ratio:1;border-radius:2px;background:${bg};border:${brd};box-shadow:${shadow};position:relative" onclick="openSheet('month','${mKey}','${MN[col]} yr ${year}','age ${year}, month ${col+1}',${NL.month},${past?1:0})">${dot}</div>`;
    }
    html+='</div>';
  }
  html+='</div><p style="margin-top:10px;font-size:10px;color:#5a6068">tap a month to view week notes + add a month note</p>';
  return html;
}

// ── Year Grid ─────────────────────────────────────────────────────
function buildYearGrid(){
  const s=A.stats,cols=10,yearsLivedInt=Math.floor(s.yearsLived);
  let html='<div style="display:flex;flex-direction:column;gap:3px">';
  for(let row=0;row<Math.ceil(s.ls/cols);row++){
    html+=`<div style="display:flex;gap:3px;align-items:center"><span style="font-size:8px;color:#3d4348;width:22px;flex-shrink:0;text-align:right;margin-right:2px">${row*10}</span>`;
    for(let col=0;col<cols;col++){
      const y=row*cols+col;if(y>=s.ls)break;
      const past=y<=yearsLivedInt,current=y===yearsLivedInt,yKey=yk(y);
      let hasNote=past&&!!A.notes[yKey];
      if(!hasNote&&past)for(let m=0;m<12;m++){if(A.notes[mk(y,m)]){hasNote=true;break;}
        if(!hasNote){const ws=Math.round((y*12+m)*(52.18/12)),we=Math.round((y*12+m+1)*(52.18/12));for(let wi=ws;wi<we;wi++)if(A.notes[wk(wi)]){hasNote=true;break;}}}
      const dc=getDecadeColor(y);
      const bg=current?CURRENT:past?dc:getDecadeColorDim(y);
      const brd=`1px solid ${current?CURRENT:past?'transparent':'#2a2e32'}`;
      const shadow=current?`0 0 6px ${CURRENT}44`:'none';
      const dot=hasNote&&past?`<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3px;color:rgba(255,255,255,.6);line-height:1;pointer-events:none">●</span>`:'';
      html+=`<div class="gc" style="flex:1;aspect-ratio:1;border-radius:3px;background:${bg};border:${brd};box-shadow:${shadow};position:relative" onclick="openSheet('year','${yKey}','year ${y}','age ${y}',${NL.year},${past?1:0})">${dot}</div>`;
    }
    html+='</div>';
  }
  html+='</div><p style="margin-top:10px;font-size:10px;color:#5a6068">tap a year to view month notes + add a year note</p>';
  return html;
}

// ── Decade Grid ───────────────────────────────────────────────────
function buildDecadeGrid(){
  const s=A.stats,currDec=Math.floor(s.yearsLived/10),totalDec=Math.ceil(s.ls/10);
  let html='<div style="display:flex;flex-wrap:wrap;gap:6px">';
  for(let d=0;d<totalDec;d++){
    const past=d<=currDec,current=d===currDec,dKey=dk(d);
    let hasNote=past&&!!A.notes[dKey];
    if(!hasNote&&past){outer:for(let yi=0;yi<10;yi++){const y=d*10+yi;if(A.notes[yk(y)]){hasNote=true;break;}
      for(let m=0;m<12;m++){if(A.notes[mk(y,m)]){hasNote=true;break outer;}
        const ws=Math.round((y*12+m)*(52.18/12)),we=Math.round((y*12+m+1)*(52.18/12));
        for(let wi=ws;wi<we;wi++)if(A.notes[wk(wi)]){hasNote=true;break outer;}}}}
    const dc=getDecadeColor(d*10);
    const bg=current?CURRENT:past?dc:getDecadeColorDim(d*10);
    const brd=`1px solid ${current?CURRENT:past?'transparent':'#2a2e32'}`;
    const shadow=current?`0 0 8px ${CURRENT}44`:'none';
    const labelColor=current?'#1F2124':TPRI;
    const decLabel=`${d*10}–${Math.min((d+1)*10-1,s.ls-1)}`;
    html+=`<div class="gc" style="width:calc(25% - 5px);aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:${bg};border:${brd};box-shadow:${shadow}" onclick="openSheet('decade','${dKey}','decade ${d+1}','age ${d*10}–${(d+1)*10-1}',${NL.decade},${past?1:0})">
      <span style="font-size:11px;font-weight:300;color:${labelColor};text-align:center;padding:0 4px">${decLabel}</span>
      ${hasNote?`<span style="font-size:7px;color:${labelColor};opacity:.6">●</span>`:''}
    </div>`;
  }
  html+='</div><p style="margin-top:12px;font-size:10px;color:#5a6068">tap a decade to view year notes + add a decade audit</p>';
  return html;
}

// ── Sun ───────────────────────────────────────────────────────────
function buildSun(clockStr){
  const[h,m]=clockStr.split(':').map(Number);
  const pct=(h*60+m)/1440;
  const arcPct=Math.max(0,Math.min(1,(pct-.25)/.5));
  const aRad=((180-arcPct*180)*Math.PI)/180;
  const W=600,H=130,cx=W/2,cy=H+20,r=H*.9;
  const sx=cx+r*Math.cos(aRad),sy=cy-r*Math.sin(aRad);
  const isNight=pct<.25||pct>.75;
  const sunVis=!isNight&&sy<H;
  const mRad=((180-arcPct*180)-180)*Math.PI/180;
  const mx=cx+r*Math.cos(mRad),my=cy-r*Math.sin(mRad);
  const moonVis=isNight&&my<H;
  const sky=pct<.20?['#0a0c10','#0d1117']:pct<.25?['#1a1220','#2d1b35']:pct<.30?['#2d1f3d','#c2714f']:pct<.38?['#1a2a4a','#e8956d']:pct<.62?['#1a2d4a','#243a52']:pct<.70?['#1a2a3a','#2a3a4a']:pct<.75?['#2a1f3a','#c2714f']:pct<.80?['#1a1225','#3d1f2d']:['#0a0c10','#0d1117'];
  const sc=isNight?null:(pct<.30||pct>.70)?'#e8956d':(pct<.38||pct>.62)?'#f5c842':CURRENT;
  const stars=isNight?[[80,20],[150,45],[230,15],[310,35],[420,18],[500,40],[560,22],[100,60],[260,55],[380,65],[470,50],[540,70],[60,80],[330,80]].map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r=".9" fill="#e6e8ea" opacity="${.4+(i%3)*.15}"/>`).join(''):'';
  return `<div style="position:relative;height:${H}px;overflow:hidden;pointer-events:none">
  <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${sky[0]}"/><stop offset="100%" stop-color="${sky[1]}"/></linearGradient>
      ${sc?`<radialGradient id="sunG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${sc}" stop-opacity=".35"/><stop offset="100%" stop-color="${sc}" stop-opacity="0"/></radialGradient>`:''}
      <radialGradient id="moonG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#aab4c8" stop-opacity=".2"/><stop offset="100%" stop-color="#aab4c8" stop-opacity="0"/></radialGradient>
      <linearGradient id="fadeG" x1="0" y1="0" x2="0" y2="1"><stop offset="40%" stop-color="${BG}" stop-opacity="0"/><stop offset="100%" stop-color="${BG}" stop-opacity="1"/></linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#skyG)"/>
    ${stars}
    ${sunVis?`<ellipse cx="${sx}" cy="${sy}" rx="52" ry="52" fill="url(#sunG)"/><circle cx="${sx}" cy="${sy}" r="14" fill="${sc}" opacity=".92"/>`:''}
    ${moonVis?`<ellipse cx="${mx}" cy="${my}" rx="38" ry="38" fill="url(#moonG)"/><circle cx="${mx}" cy="${my}" r="9" fill="#d0d8e8" opacity=".85"/>`:''}
    <line x1="0" y1="${H-1}" x2="${W}" y2="${H-1}" stroke="#ffffff08" stroke-width="1"/>
    <rect width="${W}" height="${H}" fill="url(#fadeG)"/>
  </svg>
  <div style="position:absolute;bottom:10px;left:0;right:0;text-align:center">
    <div style="font-size:30px;font-weight:200;color:${TPRI};letter-spacing:-.03em;line-height:1">${clockStr}</div>
    <div style="font-size:9px;color:${TSEC};letter-spacing:.1em;margin-top:3px;text-transform:uppercase">system time</div>
  </div>
</div>`;
}

// ── Sheet ─────────────────────────────────────────────────────────
function buildSheet(){
  const sh=A.sheet;
  const children=buildSheetChildren();
  const hasSaved=!!A.notes[sh.noteKey];
  const rem=sh.limit-(A.sheetText||'').length;
  const isCurrentWeek=sh.type==='week'&&sh.noteKey===wk(A.stats.weeksLived);
  const alreadyLogged=isCurrentWeek&&(A.moods[sh.noteKey]!==undefined||hasSaved);
  const relogBanner=alreadyLogged?`<div style="margin-bottom:14px;padding:10px 12px;background:#0d0f11;border:1px solid #2a2e32;border-radius:6px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:11px;color:#5a6068">cycle already logged</span>
    <button onclick="closeSheet();openLogSheet()" style="padding:6px 14px;background:none;border:1px solid ${CURRENT};border-radius:5px;color:${CURRENT};font-size:11px;cursor:pointer;letter-spacing:.04em">relog cycle</button>
  </div>`:'';
  const editor=sh.isPast?`${relogBanner}
    ${sh.type==='week'?`<div style="margin-bottom:12px">
      <div style="font-size:9px;color:${TSEC};letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">cycle rating</div>
      <div style="display:flex;gap:5px">
        ${[0,1,2,3].map(i=>{const sel=A.moods[sh.noteKey]===i;return`<button onclick="setSheetMood(${i})" style="flex:1;padding:5px 4px;font-size:9px;border-radius:4px;border:1px solid ${i===0?'#6A5A7A':i===1?'#5A4A6A':BORDER};background:${sel?(i===0?'#4A3A5A':i===1?'#3d3550':'rgba(242,197,114,.15)'):DEEP};color:${sel?(i===0?'#E6E8EA':i===1?'#E6E8EA':CURRENT):TSEC};cursor:pointer">${MOOD_LABELS[i]}</button>`;}).join('')}
      </div>
    </div>`:''}
    <div style="font-size:9px;color:${TSEC};letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${hasSaved?'edit note':'add note'} — ${sh.limit} char max</div>
    <textarea id="sheet-ta" oninput="sheetInput(this.value)" rows="3" placeholder="log entry…">${e(A.sheetText)}</textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <span style="font-size:10px;color:${rem<20?'#e07070':'#5a6068'}">${rem} left</span>
      <div style="display:flex;gap:8px">
        ${hasSaved?`<button onclick="deleteNote()" style="padding:7px 12px;background:none;color:#e07070;border:1px solid rgba(224,112,112,.27);border-radius:5px;font-size:12px;cursor:pointer">clear</button>`:''}
        <button onclick="closeSheet()" style="padding:7px 12px;background:none;color:${TSEC};border:1px solid ${BORDER};border-radius:5px;font-size:12px;cursor:pointer">cancel</button>
        <button onclick="saveNote()" style="padding:7px 18px;background:${CURRENT};color:#1F2124;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:500">save</button>
      </div>
    </div>`
    :`<div class="future-msg"><div style="font-size:11px;color:#5a6068">this period hasn't happened yet.</div><div style="font-size:10px;color:#3d4348;margin-top:4px">notes can only be added to past or current periods.</div></div>`;
  return `<div class="overlay" onclick="overlayClick(event)">
  <div class="sheet" onclick="event.stopPropagation()" id="sheet-panel"
    ontouchstart="sheetTouchStart(event)" ontouchend="sheetTouchEnd(event)">
    <div class="sheet-header">
      <div class="sheet-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="navigateSheet(-1)" style="background:none;border:none;color:${TSEC};font-size:18px;cursor:pointer;padding:0;line-height:1;opacity:.6">‹</button>
          <div>
            <div style="font-size:15px;font-weight:300;color:${TPRI}">${e(sh.title)}</div>
            ${sh.subtitle?`<div style="font-size:11px;color:${TSEC};margin-top:3px">${e(sh.subtitle)}</div>`:''}
          </div>
          <button onclick="navigateSheet(1)" style="background:none;border:none;color:${TSEC};font-size:18px;cursor:pointer;padding:0;line-height:1;opacity:.6">›</button>
        </div>
        <button onclick="closeSheet()" style="font-size:20px;color:${TSEC};background:none;border:none;cursor:pointer;padding:0 6px;line-height:1">×</button>
      </div>
    </div>
    <div class="sheet-body">
      ${children}
      ${children?`<div style="height:1px;background:${BORDER};margin:14px 0"></div>`:''}
      ${editor}
    </div>
  </div>
</div>`;
}

function noteRow(label,text){
  return `<div class="note-row"><div class="note-row-label">${label}</div><div class="note-row-text">${e(text)}</div></div>`;
}

function weekNotesForMonth(y,m,maxWeek){
  const rows=[];
  const ws=Math.round((y*12+m)*(52.18/12)),we=Math.round((y*12+m+1)*(52.18/12));
  for(let wi=ws;wi<Math.min(we,maxWeek+1);wi++){const t=A.notes[wk(wi)];if(t)rows.push(noteRow(`wk ${wi+1}`,t));}
  return rows;
}

function buildSheetChildren(){
  const sh=A.sheet,s=A.stats;
  if(!sh||!s||sh.type==='week')return '';
  const maxWeek=s.weeksLived;

  // ── MONTH: show week notes ────────────────────────────────────────
  if(sh.type==='month'){
    const[,rest]=sh.noteKey.split('m');
    const[year,month]=rest.split('_').map(Number);
    const rows=weekNotesForMonth(year,month,maxWeek);
    if(!rows.length)return `<p style="font-size:12px;color:#5a6068;font-style:italic;margin-bottom:4px">no week entries this month.</p>`;
    return rows.join('');
  }

  // ── YEAR: month notes + nested week notes ─────────────────────────
  if(sh.type==='year'){
    const y=+sh.noteKey.replace('y','');
    const rows=[];
    for(let m=0;m<12;m++){
      const mt=A.notes[mk(y,m)];
      const wrows=weekNotesForMonth(y,m,maxWeek);
      if(mt||wrows.length){
        rows.push(`<div style="font-size:8px;color:#5a6068;letter-spacing:.07em;text-transform:uppercase;padding:6px 0 3px${rows.length?';border-top:1px solid #2a2e32;margin-top:4px':''}">${MN[m]}</div>`);
        if(mt)rows.push(noteRow('month note',mt));
        rows.push(...wrows);
      }
    }
    if(!rows.length)return `<p style="font-size:12px;color:#5a6068;font-style:italic;margin-bottom:4px">no entries this year.</p>`;
    return rows.join('');
  }

  // ── DECADE: year notes + nested month + week notes ────────────────
  if(sh.type==='decade'){
    const d=+sh.noteKey.replace('d','');
    const rows=[];
    for(let yi=0;yi<10;yi++){
      const y=d*10+yi;
      if(y>Math.floor(s.yearsLived))break;
      const yt=A.notes[yk(y)];
      const yearRows=[];
      for(let m=0;m<12;m++){
        const mt=A.notes[mk(y,m)];
        const wrows=weekNotesForMonth(y,m,maxWeek);
        if(mt||wrows.length){
          yearRows.push(`<div style="font-size:8px;color:#5a6068;letter-spacing:.06em;text-transform:uppercase;padding:4px 0 2px;margin-left:8px">${MN[m]}</div>`);
          if(mt)yearRows.push(`<div style="margin-left:8px">${noteRow('month',mt)}</div>`);
          wrows.forEach(r=>yearRows.push(`<div style="margin-left:8px">${r}</div>`));
        }
      }
      if(yt||yearRows.length){
        rows.push(`<div style="font-size:9px;color:${TSEC};letter-spacing:.06em;text-transform:uppercase;padding:8px 0 4px${rows.length?';border-top:1px solid #2a2e32;margin-top:4px':''}">year ${y}</div>`);
        if(yt)rows.push(noteRow('year note',yt));
        rows.push(...yearRows);
      }
    }
    if(!rows.length)return `<p style="font-size:12px;color:#5a6068;font-style:italic;margin-bottom:4px">no entries this decade.</p>`;
    return rows.join('');
  }
  return '';
}
function navigateSheet(dir){
  if(!A.sheet)return;
  const s=A.stats,type=A.sheet.type;
  // auto-save current text
  if(A.sheetText&&A.sheetText!==(A.notes[A.sheet.noteKey]||'')){
    A.notes[A.sheet.noteKey]=A.sheetText;save();
  }
  if(type==='week'){
    const cur=+A.sheet.noteKey.slice(1);
    const next=cur+dir;
    if(next<0||next>=s.totalWeeks)return;
    const isPast=next<=s.weeksLived;
    openSheet('week',wk(next),`week ${next+1}`,weekRange(A.birthDate,next),NL.week,isPast);
  } else if(type==='month'){
    const[,rest]=A.sheet.noteKey.split('m');
    const[y,m]=rest.split('_').map(Number);
    const totalMonths=Math.round(s.ls*12);
    const cur=y*12+m,next=cur+dir;
    if(next<0||next>=totalMonths)return;
    const ny=Math.floor(next/12),nm=next%12;
    const monthsLived=Math.floor(s.yearsLived*12);
    openSheet('month',mk(ny,nm),`${MN[nm]} yr ${ny}`,`age ${ny}, month ${nm+1}`,NL.month,next<=monthsLived);
  } else if(type==='year'){
    const cur=+A.sheet.noteKey.replace('y','');
    const next=cur+dir;
    if(next<0||next>=s.ls)return;
    const isPast=next<=Math.floor(s.yearsLived);
    openSheet('year',yk(next),`year ${next}`,`age ${next}`,NL.year,isPast);
  } else if(type==='decade'){
    const cur=+A.sheet.noteKey.replace('d','');
    const next=cur+dir;
    const totalDec=Math.ceil(s.ls/10);
    if(next<0||next>=totalDec)return;
    const isPast=next<=Math.floor(s.yearsLived/10);
    openSheet('decade',dk(next),`decade ${next+1}`,`age ${next*10}–${(next+1)*10-1}`,NL.decade,isPast);
  }
}

function setSheetMood(m){

// ── Export / Import ───────────────────────────────────────────────
function notesToCSVRows(){
  const rows=[['date','title','note']];
  Object.keys(A.notes).forEach(key=>{
    if(!key.startsWith('w'))return;
    const idx=+key.slice(1);
    const s=new Date(A.birthDate);s.setDate(s.getDate()+idx*7);
    const dateStr=s.toISOString().split('T')[0];
    rows.push([dateStr,`week ${idx+1}`,A.notes[key]]);
  });
  return rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
}

function exportCSV(){
  const b=new Blob([notesToCSVRows()],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='life-system-timeline.csv';a.click();
  showToast('csv exported');
}

function exportJSON(){
  const out={};
  Object.keys(A.notes).forEach(key=>{
    if(!key.startsWith('w'))return;
    const idx=+key.slice(1);
    const s=new Date(A.birthDate);s.setDate(s.getDate()+idx*7);
    out[s.toISOString().split('T')[0]]={weekIndex:idx,note:A.notes[key]};
  });
  const b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='life-system-timeline.json';a.click();
  showToast('json exported');
}

function importFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.json';
  inp.onchange=ev=>{
    const f=ev.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=re=>{
      try{
        const text=re.target.result;
        let imported=0;
        if(f.name.endsWith('.json')){
          const d=JSON.parse(text);
          // support both backup format and timeline format
          if(d.notes){Object.assign(A.notes,d.notes);imported=Object.keys(d.notes).length;}
          else{Object.keys(d).forEach(dateStr=>{const idx=dateToWeekIdx(A.birthDate,dateStr);if(idx>=0){A.notes[wk(idx)]=d[dateStr].note||'';imported++;}});}
        } else {
          // CSV parse
          const lines=text.trim().split('\n').slice(1);
          lines.forEach(line=>{
            const cols=line.match(/(".*?"|[^,]+)(?=,|$)/g)||[];
            const clean=c=>c.replace(/^"|"$/g,'').replace(/""/g,'"');
            const dateStr=clean(cols[0]||''),note=clean(cols[2]||cols[1]||'');
            if(!dateStr)return;
            const idx=dateToWeekIdx(A.birthDate,dateStr);
            if(idx>=0){A.notes[wk(idx)]=note.slice(0,140);imported++;}
          });
        }
        save();render();showToast(`imported ${imported} entries`);
      }catch{showToast('import failed — check file format');}
    };r.readAsText(f);
  };inp.click();
}

function copyPrompt(){
  const prompt=`Help me create a life timeline file for import into my Life System app.\n\nOutput in CSV format with these columns:\ndate,title,note\n\nRules:\n- Use real or approximate dates when exact dates are unknown\n- Keep titles short (under 40 chars)\n- Keep notes under 100 characters\n- Focus on meaningful milestones\n- Cover my life from childhood to today\n- Include recurring milestones: birthdays (every year), New Year's (Jan 1 each year), and any personal holidays or traditions\n- If exact dates are unknown, estimate reasonably\n\nI will paste my life history below:\n[PASTE YOUR LIFE HISTORY HERE]`;
  navigator.clipboard.writeText(prompt).then(()=>showToast('prompt copied')).catch(()=>showToast('copy failed'));
}

function doBackup(){
  const data=JSON.stringify({notes:A.notes,config:{birthDate:A.birthDate,lifespan:A.lifespan,mission:A.mission}},null,2);
  const b=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='life-system-backup.json';a.click();
  showToast('backup downloaded');
}

function doRestore(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=ev=>{
    const f=ev.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=re=>{
      try{
        const d=JSON.parse(re.target.result);
        if(d.notes)A.notes=d.notes;
        if(d.config){const cfg=d.config;A.birthDate=cfg.birthDate||'';A.lifespan=cfg.lifespan||90;A.mission=cfg.mission||'';saveConfig();
          if(cfg.birthDate){A.stats=calcStats(cfg.birthDate,cfg.lifespan||90);A.step='dashboard';}}
        save();render();showToast('restore complete');
      }catch{showToast('invalid backup file');}
    };r.readAsText(f);
  };inp.click();
}

let _tx=0;
function sheetTouchStart(ev){_tx=ev.touches[0].clientX;}
function sheetTouchEnd(ev){
  const dx=ev.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)>50)navigateSheet(dx<0?1:-1);
}
document.addEventListener('keydown',ev=>{
  if(!A.sheet||A.sheet.type!=='week')return;
  if(ev.key==='ArrowRight')navigateSheet(1);
  if(ev.key==='ArrowLeft')navigateSheet(-1);
  if(ev.key==='Escape')closeSheet();
});

function handleStart(){

}
function goConfig(){A.step='input';render();}
function setTab(t){A.tab=t;render();}
function toggleGoto(){A.gotoOpen=!A.gotoOpen;render();}
function gotoDate(){
  const d=document.getElementById('goto-date')?.value;
  if(!d||!A.birthDate)return;
  const idx=dateToWeekIdx(A.birthDate,d);
  A.tab='weeks';A.highlightWeek=idx;A.gotoOpen=false;

  setTimeout(()=>{

      openSheet('week',wk(idx),`week ${idx+1}`,weekRange(A.birthDate,idx),NL.week,idx<=A.stats.weeksLived);}

  setTimeout(()=>{A.highlightWeek=null;},3000);
}
function openSheet(type,noteKey,title,subtitle,limit,isPast){
  A.sheet={type,noteKey,title,subtitle,limit,isPast:!!isPast};
  A.sheetText=A.notes[noteKey]||'';
  render();
  setTimeout(()=>{const ta=document.getElementById('sheet-ta');if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},80);
}
function sheetInput(val){
  if(!A.sheet)return;
  A.sheetText=val.slice(0,A.sheet.limit);
  const rem=A.sheet.limit-A.sheetText.length;
  document.querySelectorAll('.sheet-body span').forEach(sp=>{if(sp.textContent.includes('left'))sp.textContent=rem+' left';});
}

// ── Live metric tickers ───────────────────────────────────────────
(function startTickers(){
  if(!A.stats||!A.birthDate)return;
  const birth=new Date(A.birthDate);
  if(isNaN(birth.getTime()))return;

  // heartbeats: ~1.15/sec (100800/day)
  let hbFrac=0;
  setInterval(()=>{
    const el=document.getElementById('live-hb');
    if(!el)return;
    hbFrac+=100800/86400; // beats per second
    const ms=Date.now()-birth.getTime();
    const days=ms/86400000;
    const hb=Math.floor(days*100800+hbFrac);
    el.textContent=new Intl.NumberFormat().format(hb);
  },1000);

  // memory writes: ~150/day = 1 per ~576 seconds
  let mwAccum=0;
  setInterval(()=>{
    const el=document.getElementById('live-mw');
    if(!el)return;
    mwAccum+=1.5/86400*250; // every 250ms — ~1 memory per 16hrs
    const ms=Date.now()-birth.getTime();
    const days=ms/86400000;
    const mw=Math.round(days*150+mwAccum);
    el.textContent=new Intl.NumberFormat().format(mw);
  },250);

  // earth orbits: year advances ~3.17e-8 per second = 0.00001 per ~5.5 min
  // update every 2s for smooth 5-decimal display
  setInterval(()=>{
    const el=document.getElementById('live-orb');
    if(!el)return;
    const ms=Date.now()-birth.getTime();
    const years=ms/(365.25*86400000);
    el.textContent=years.toFixed(5);
  },2000);
})();
